name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  aliases-preamble:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
      - name: Run aliases preamble test
        run: bash tests/test-aliases-preamble.sh
      - name: Run aliases bash+zsh source test
        run: bash tests/test-aliases-bash-source.sh
  wb-resolve-root:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run wb resolver test
        run: bash tests/test-wb-resolve-root.sh
  # TODO(windows): add windows-latest when the version-check lib is bash-portable
  # enough to run under git-bash.
